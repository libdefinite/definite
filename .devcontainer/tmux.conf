# Use C-a as prefix (screen-style)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Quality of life
set -g mouse on
set -g history-limit 10000
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Status bar
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Inactive window tab
setw -g window-status-format " #I:#W "
setw -g window-status-style "bg=#313244,fg=#6c7086"

# Active window tab
setw -g window-status-current-format " #I:#W#{?window_zoomed_flag, 󰊓,} "
setw -g window-status-current-style "bg=#89b4fa,fg=#1e1e2e,bold"

# Left/right status
set -g status-left "#[bg=#a6e3a1,fg=#1e1e2e,bold] #S #[default] "
set -g status-right "#[fg=#6c7086] %H:%M  %d %b "
set -g status-left-length 20

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-save every 15 min, restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.tmux/plugins/tpm/tpm'
