name: Lint

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: extractions/setup-just@v3

      - name: Run linters
        run: just lint

      - name: Lint protos
        run: just proto-lint
